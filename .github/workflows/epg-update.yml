name: EPG Update
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: epg-update
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 19 * * *'        # UTC时间：19点，北京时间：次日凌晨3点
    - cron: '0 07 * * *'        # UTC时间：7点，北京时间：当天下午15点
  workflow_dispatch:
 
jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # GitHub Actions 的 ubuntu-latest 已经预装了 Chrome 和 chromedriver
      # 无需额外安装，只需确保 chromedriver 在 PATH 中
    #  - name: Verify Chrome and chromedriver
    #    run: |
    #      google-chrome --version
    #      chromedriver --version

      - name: Install Python dependencies
        run: |
          pip install selenium lxml curl_cffi beautifulsoup4 requests
          # 注意：不再安装 webdriver_manager

      - name: Run EPG scraper
        run: |
          #  echo "=== 运行 rudong-epg.py ==="
          python rudong-epg.py
          #  echo "=== 运行 nantong-epg.py ==="
          #  python nantong-epg.py
    
      - name: Commit and push changes (only if epg.xml changed)
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # 将 epg.xml 加入暂存区
          git add epg.xml 2>/dev/null || true
          
          # 检查暂存区是否有变化（即 epg.xml 内容是否改变）
          if git diff --cached --quiet; then
            echo "epg.xml 无变化，跳过压缩和提交"
          else
            echo "epg.xml 已更新，开始压缩并提交"
            gzip -c epg.xml > epg.xml.gz
            git add epg.xml.gz
            git commit -m "Update EPG data"
            git push
          fi
          
          
  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: update-epg
    if: always()   # 即使 update-epg 失败也运行
    
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1          # 只需要最新代码，不需要历史

      # ---------- 新增：计算当前文件的 MD5 ----------
      - name: Calculate current hash
        id: hash
        run: |
          echo "hash=$(md5sum epg.xml | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      # ---------- 新增：恢复上次成功推送时的 MD5 ----------
      - name: Restore previous hash from cache
        id: cache
        uses: actions/cache@v3
        with:
          path: epg_hash.txt
          key: epg-hash-${{ github.ref }}-${{ github.run_id }}   # 按分支缓存
          restore-keys: |
            epg-hash-

      # ---------- 替换原有的变化检测步骤 ----------
      - name: Check if epg.xml changed
        id: check_changes
        run: |
          current="${{ steps.hash.outputs.hash }}"
          if [ -f epg_hash.txt ]; then
            previous=$(cat epg_hash.txt)
            if [ "$current" = "$previous" ]; then
              echo "epg.xml 内容无变化，跳过同步"
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "epg.xml 已变化（$previous → $current），开始同步到 Gitee"
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "首次运行或缓存缺失，epg.xml 需要同步"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH key for Gitee
        if: steps.check_changes.outputs.changed == 'true'      
        env:
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh/
          echo "$GITEE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts

      - name: Push ONLY epg.xml and epg.xml.gz to Gitee
        if: steps.check_changes.outputs.changed == 'true'
        id: push
        run: |
          mkdir /tmp/gitee_push
          cp epg.xml epg.xml.gz /tmp/gitee_push/
          cd /tmp/gitee_push
          git config --global init.defaultBranch main
          git init
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add epg.xml epg.xml.gz
          git commit -m "Update EPG data only"
          git remote add gitee git@gitee.com:magihub/epg.git
          git push gitee main

      # ---------- 新增：推送成功后更新本地哈希文件（缓存会自动保存） ----------
      - name: Update hash after successful push
        if: steps.push.outcome == 'success' && steps.check_changes.outputs.changed == 'true'
        run: |
          echo "${{ steps.hash.outputs.hash }}" > epg_hash.txt        