name: EPG Update
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: epg-update
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 19 * * *'        # UTC时间：19点，北京时间：次日凌晨3点
    - cron: '0 20 * * *'        # UTC时间：20点，北京时间：次日凌晨4点
    - cron: '0 07 * * *'        # UTC时间：7点，北京时间：当天下午15点
  workflow_dispatch:
 
jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # GitHub Actions 的 ubuntu-latest 已经预装了 Chrome 和 chromedriver

      - name: Cache pip packages
        uses: actions/cache@v3
        id: cache-pip
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v1
          # restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: pip install selenium lxml curl_cffi beautifulsoup4 requests
        
      - name: List cached packages
        run: |
          pip list
          ls -la ~/.cache/pip
      
      - name: Cache ZeroTier installation
        uses: actions/cache@v3
        id: cache-zerotier
        with:
          path: |
            /var/lib/zerotier-one
            /usr/sbin/zerotier-cli
            /usr/sbin/zerotier-idtool
            /usr/lib/systemd/system/zerotier-one.service
          key: ${{ runner.os }}-zerotier-v0
          # restore-keys: ${{ runner.os }}-zerotier-
            
      - name: Install ZeroTier (if not cached)
        if: steps.cache-zerotier.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /var/lib/zerotier-one
          echo "${{ secrets.ZEROTIER_IDENTITY_SECRET }}" | sudo tee /var/lib/zerotier-one/identity.secret > /dev/null
          curl -s https://install.zerotier.com | sudo bash
          sudo chmod -R 777 /var/lib/zerotier-one          # 修复权限，以便缓存能够读取所有文件

      - name: Join ZeroTier network with identity
        run: |
          sudo systemctl start zerotier-one          
          sudo zerotier-cli join ${{ secrets.ZEROTIER_NETWORK_ID }}
          start_time=$(date +%s)
          for i in {1..30}; do
            if sudo zerotier-cli listnetworks | grep -qE '([0-9]{1,3}\.){3}[0-9]{1,3}'; then
              end_time=$(date +%s)
              elapsed=$((end_time - start_time))
              echo "ZeroTier IP assigned after ${elapsed} seconds"
              break
            fi
            echo "Waiting for IP... ($i/30)"
            sleep 1
          done          
          sudo chmod -R 777 /var/lib/zerotier-one          # 修复权限，以便缓存能够读取所有文件
          sudo zerotier-cli listnetworks | awk 'NR==1 {print $1, $2, $6, $7, $9, $10, $11}'
          sudo zerotier-cli listnetworks | awk 'NR==2 {print $1, $2, $6, $7, $9}' | sed -E '
            s/([0-9a-f]{2}):([0-9a-f]{2}):([0-9a-f]{2}):([0-9a-f]{2}):([0-9a-f]{2}):([0-9a-f]{2})/\1:**:**:**:**:\6/g
            s/([0-9]+)\.([0-9]+)\.([0-9]+)\.([0-9]+)\/24/\1.*.*.\4\/24/g
            s/([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+)\/([0-9]+)/\1:*:*:*:*:*:*:\8\/\9/g
          '  
        
      # 如东脚本（无需代理）
      - name: Run Rudong EPG
        run: |
          echo "=== 运行 rudong-epg.py ==="
          python scripts/rudong-epg.py
        continue-on-error: true
        
      # 南通脚本（需要代理）
      - name: Run Nantong EPG via Proxy
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: echo "=== 运行 nantong-epg.py ===" && python scripts/nantong-epg.py
        env:
          http_proxy: "http://${{ secrets.TINY_PROXY_IP }}:${{ secrets.TINY_PROXY_PORT }}"
          https_proxy: "http://${{ secrets.TINY_PROXY_IP }}:${{ secrets.TINY_PROXY_PORT }}"        
        continue-on-error: true

      # 苏州脚本（无需代理）        
      - name: Run Suzhou EPG
        run: |      
          echo "=== 运行 suzhou-epg.py ==="
          python scripts/suzhou-epg.py
        continue-on-error: true

      # 镇江脚本（电视无需代理、广播需要代理）
      - name: Run Zhenjiang EPG via Proxy
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: echo "=== 运行 zhenjiang-epg.py ===" && python scripts/zhenjiang-epg.py
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}            
        continue-on-error: true
        
      - name: Commit and push changes (only if epg.xml changed)
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          if git diff --quiet epg.xml; then
            echo "epg.xml 无变化，跳过压缩和提交"
          else
            echo "epg.xml 已更新，开始压缩并提交"
            gzip -c epg.xml > epg.xml.gz
            git add epg.xml epg.xml.gz
            export TZ='Asia/Shanghai'
            git commit -m "Update EPG data - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
        continue-on-error: true          
          
  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: update-epg
    if: always()   # 即使 update-epg 失败也运行
    
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1          # 只需要最新代码，不需要历史

      # ---------- 新增：计算当前文件的 MD5 ----------
      - name: Calculate current hash
        id: hash
        run: |
          echo "hash=$(md5sum epg.xml | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      # ---------- 新增：恢复上次成功推送时的 MD5 ----------
      - name: Restore previous hash from cache
        id: cache
        uses: actions/cache@v3
        with:
          path: epg_hash.txt
          key: epg-hash-${{ github.ref }}   # 按分支缓存
          restore-keys: |
            epg-hash-

      # ---------- 替换原有的变化检测步骤 ----------
      - name: Check if epg.xml changed
        id: check_changes
        run: |
          current="${{ steps.hash.outputs.hash }}"
          if [ -f epg_hash.txt ]; then
            previous=$(cat epg_hash.txt)
            if [ "$current" = "$previous" ]; then
              echo "epg.xml 内容无变化，跳过同步"
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "epg.xml 已变化（$previous → $current），开始同步到 Gitee"
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "首次运行或缓存缺失，epg.xml 需要同步"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH key for Gitee
        if: steps.check_changes.outputs.changed == 'true'      
        env:
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh/
          echo "$GITEE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts

      - name: Push ONLY epg.xml and epg.xml.gz to Gitee
        if: steps.check_changes.outputs.changed == 'true'
        id: push
        run: |
          mkdir /tmp/gitee_push
          cp epg.xml epg.xml.gz /tmp/gitee_push/
          cd /tmp/gitee_push
          git config --global init.defaultBranch main
          git init
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add epg.xml epg.xml.gz
          export TZ='Asia/Shanghai'
          git commit -m "Update EPG data - $(date +'%Y-%m-%d %H:%M:%S')"
          git remote add gitee git@gitee.com:magihub/epg.git
          git push --force gitee main
        continue-on-error: true          

      # ---------- 新增：推送成功后更新本地哈希文件（缓存会自动保存） ----------
      - name: Update hash after successful push
        if: steps.push.outcome == 'success' && steps.check_changes.outputs.changed == 'true'
        run: |
          echo "${{ steps.hash.outputs.hash }}" > epg_hash.txt        