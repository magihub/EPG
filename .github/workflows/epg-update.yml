name: EPG Update

permissions:
  contents: write

concurrency:
  group: epg-update
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 3/12 * * *'
  workflow_dispatch:
 
jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Setup ChromeDriver
        uses: browser-actions/setup-chromedriver@v1
        with:
          chrome-version: 'stable'
          

- name: Display Chrome path (debug)
  run: |
    which chrome
    which chromedriver
    chrome --version

      - name: Install Python dependencies
        run: |
          pip install selenium lxml

      - name: Run EPG scraper
        run: python rudong-epg.py   # 这里指定需要执行的脚本文件名

      - name: Compress epg.xml (optional)
        run: gzip -c epg.xml > epg.xml.gz || true

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add epg.xml epg.xml.gz 2>/dev/null || true
          git commit -m "Update EPG data (skip ci)" || echo "No changes to commit"
          git push