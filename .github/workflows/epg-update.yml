name: EPG Update
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: epg-update
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 19 * * *'        # UTC时间：19点，北京时间：次日凌晨3点
    - cron: '0 07 * * *'        # UTC时间：7点，北京时间：当天下午15点
  workflow_dispatch:
 
jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

                   
    #   - name: Display Chrome path (debug)
    #     run: |
    #       which chrome
    #       which chromedriver
    #       chrome --version
          

      - name: Install Python dependencies
        run: |
          pip install selenium lxml webdriver-manager

      - name: Run EPG scraper
        run: |
          python rudong-epg.py   # 生成 epg.xml（如东）
          python nantong-epg.py  # 合并南通电视+广播到同一个 epg.xml

      - name: Compress epg.xml (optional)
        run: gzip -c epg.xml > epg.xml.gz || true

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add epg.xml epg.xml.gz 2>/dev/null || true
          git commit -m "Update EPG data (skip ci)" || echo "No changes to commit"
          git push
          
          
  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: update-epg          # 只有主任务成功后才运行

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key for Gitee
        env:
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh/
          echo "$GITEE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts

      - name: Push ONLY epg.xml and epg.xml.gz to Gitee
        run: |
          # 创建临时目录
          mkdir /tmp/gitee_push
          # 复制需要的两个文件
          cp epg.xml epg.xml.gz /tmp/gitee_push/
          cd /tmp/gitee_push
          # 初始化一个全新的仓库
          git config --global init.defaultBranch main
          git init
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git branch -m master main   # 将默认的 master 分支重命名为 main
          git add epg.xml epg.xml.gz
          git commit -m "Update EPG data only"
          # 强制推送到 Gitee 的 main 分支（会覆盖远程所有内容）
          git remote add gitee git@gitee.com:magihub/epg.git
          git push gitee main --force