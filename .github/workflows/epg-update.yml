name: EPG Update
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: epg-update
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 19 * * *'        # UTC时间：19点，北京时间：次日凌晨3点
    - cron: '0 20 * * *'        # UTC时间：20点，北京时间：次日凌晨4点
    - cron: '0 02 * * *'        # UTC时间：2点，北京时间：当天上午10点
                                # （实测如东电视、苏州广电、镇江广电更新于9：40分左右，如东广播、南通广电更新于凌晨0:00后不久）
    - cron: '0 07 * * *'        # UTC时间：7点，北京时间：当天下午15点
  workflow_dispatch:
    inputs:
      skip_update:
        description: 'Skip EPG update'
        required: false
        default: 'false'
        type: boolean
      skip_gitee_sync:
        description: 'Skip Gitee sync'
        required: false
        default: 'false'
        type: boolean
        
jobs:
  check-permission:
    runs-on: ubuntu-latest
    steps:
      - name: Check if triggered by authorized user
        if: github.event_name == 'workflow_dispatch' && github.actor != 'magihub'
        run: |
          echo "你无权触发此工作流"
          exit 1

  update-epg:
    runs-on: ubuntu-latest
    needs: check-permission    
    if: github.event.inputs.skip_update != 'true'
    env:
      TZ: Asia/Shanghai
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # GitHub Actions 的 ubuntu-latest 已经预装了 Chrome 和 chromedriver

      - name: Install Python dependencies
        run: pip install selenium lxml curl_cffi beautifulsoup4 requests

      - name: Cache ZeroTier deb package
        uses: actions/cache@v3
        id: cache-deb
        with:
          path: zerotier-one_1.16.1_amd64.deb
          key: ${{ runner.os }}-zerotier-deb-1.16.1

      - name: Download ZeroTier deb package (if not cached)
        if: steps.cache-deb.outputs.cache-hit != 'true'
        run: |
          wget https://download.zerotier.com/debian/noble/pool/main/z/zerotier-one/zerotier-one_1.16.1_amd64.deb

      - name: Setup ZeroTier identity
        run: |
          sudo mkdir -p /var/lib/zerotier-one
          echo "${{ secrets.ZEROTIER_IDENTITY_SECRET }}" | sudo tee /var/lib/zerotier-one/identity.secret > /dev/null

      - name: Install ZeroTier from deb
        run: sudo dpkg -i zerotier-one_1.16.1_amd64.deb
        
      - name: Join ZeroTier network
        run: |
          # sudo mkdir -p /var/lib/zerotier-one
          # echo "${{ secrets.ZEROTIER_IDENTITY_SECRET }}" | sudo tee /var/lib/zerotier-one/identity.secret > /dev/null
          # curl -s https://install.zerotier.com | sudo bash        
          # sudo systemctl start zerotier-one          
          sudo zerotier-cli join ${{ secrets.ZEROTIER_NETWORK_ID }}
          start_time=$(date +%s)
          for i in {1..60}; do
            if sudo zerotier-cli listnetworks | grep -qE '([0-9]{1,3}\.){3}[0-9]{1,3}'; then
              end_time=$(date +%s)
              elapsed=$((end_time - start_time))
              echo "ZeroTier IP assigned after ${elapsed} seconds"
              break
            fi
            echo "Waiting for IP... ($i/60)"
            sleep 1
          done          
          sudo zerotier-cli listnetworks | awk 'NR==1 {print $1, $2, $6, $7, $9, $10, $11}'
          sudo zerotier-cli listnetworks | awk 'NR==2 {print $1, $2, $6, $7, $9}' | sed -E '
            s/([0-9a-f]{2}):([0-9a-f]{2}):([0-9a-f]{2}):([0-9a-f]{2}):([0-9a-f]{2}):([0-9a-f]{2})/\1:**:**:**:**:\6/g
            s/([0-9]+)\.([0-9]+)\.([0-9]+)\.([0-9]+)\/24/\1.*.*.\4\/24/g
            s/([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+):([0-9a-fA-F]+)\/([0-9]+)/\1:*:*:*:*:*:*:\8\/\9/g
          '  
        
      # 如东脚本（无需代理）
      - name: Run Rudong EPG
        run: |
          echo "=== 运行 rudong-epg.py ==="
          python scripts/rudong-epg.py
        continue-on-error: true
        
      # 南通脚本（需要代理）
      - name: Test TinyProxy to ntjoy.com
        id: test_ntjoy
        run: |
          set +e
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -x http://${{ secrets.TINY_PROXY_IP }}:${{ secrets.TINY_PROXY_PORT }} \
            --connect-timeout 10 \
            https://web.ntjoy.com)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "代理测试成功 (HTTP $HTTP_CODE)"
            echo "proxy_ok=true" >> $GITHUB_OUTPUT
          else
            echo "代理测试失败 (HTTP $HTTP_CODE)"
            echo "proxy_ok=false" >> $GITHUB_OUTPUT
          fi
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}
        continue-on-error: true
        
      - name: Run Nantong EPG via Proxy
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 5
          command: echo "=== 运行 nantong-epg.py ===" && python scripts/nantong-epg.py
        env:
          http_proxy: "http://${{ secrets.TINY_PROXY_IP }}:${{ secrets.TINY_PROXY_PORT }}"
          https_proxy: "http://${{ secrets.TINY_PROXY_IP }}:${{ secrets.TINY_PROXY_PORT }}"        
        continue-on-error: true

      # 苏州脚本（无需代理）        
      - name: Run Suzhou EPG
        run: |      
          echo "=== 运行 suzhou-epg.py ==="
          python scripts/suzhou-epg.py
        continue-on-error: true

      # 镇江脚本（电视无需代理、广播需要代理）
      - name: Test TinyProxy to zjmc.tv
        id: test_zjmc
        run: |
          set +e
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -x http://${{ secrets.TINY_PROXY_IP }}:${{ secrets.TINY_PROXY_PORT }} \
            --connect-timeout 10 \
            https://www.zjmc.tv)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "代理测试成功 (HTTP $HTTP_CODE)"
            echo "proxy_ok=true" >> $GITHUB_OUTPUT
          else
            echo "代理测试失败 (HTTP $HTTP_CODE)"
            echo "proxy_ok=false" >> $GITHUB_OUTPUT
          fi  
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}
        continue-on-error: true            
            
      - name: Run Zhenjiang EPG via Proxy
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 5
          command: echo "=== 运行 zhenjiang-epg.py ===" && python scripts/zhenjiang-epg.py
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}            
        continue-on-error: true
        
      - name: Commit and push changes (only if epg.xml changed)
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          if git diff --quiet epg.xml; then
            echo "epg.xml 无变化，跳过压缩和提交"
          else
            echo "epg.xml 已更新，开始压缩并提交"
            gzip -c epg.xml > epg.xml.gz
            git add epg.xml epg.xml.gz
            # export TZ='Asia/Shanghai'
            git commit -m "Update EPG data - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
        continue-on-error: true          
          
  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: [check-permission, update-epg]
    if: always() && github.event.inputs.skip_gitee_sync != 'true'   # 即使 update-epg 失败也运行
    env:
      TZ: Asia/Shanghai
      
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # 确保 HEAD~1 可用

      - name: Setup SSH key for Gitee
        env:
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh/
          echo "$GITEE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts
          
      - name: Add Gitee remote
        run: |
          git remote add gitee git@gitee.com:magihub/epg.git
          git fetch gitee main

      - name: Check if epg.xml changed compared to Gitee
        id: check_changes
        run: |
          if git diff --quiet gitee/main -- epg.xml; then
            echo "epg.xml 无变化，跳过同步"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "epg.xml 已变化，开始同步到 Gitee"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Debug changed value
        run: echo "changed=${{ steps.check_changes.outputs.changed }}"
  
      - name: Push ONLY epg.xml and epg.xml.gz to Gitee
        if: steps.check_changes.outputs.changed == 'true'
        id: push
        run: |
          mkdir /tmp/gitee_push
          cp epg.xml epg.xml.gz /tmp/gitee_push/
          cd /tmp/gitee_push
          git init
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'          
          git remote add gitee git@gitee.com:magihub/epg.git
          git fetch gitee
          git pull gitee main --allow-unrelated-histories --no-rebase || true
          git add epg.xml epg.xml.gz
          # export TZ='Asia/Shanghai'
          git commit -m "Update EPG data - $(date +'%Y-%m-%d %H:%M:%S')"
          git push gitee main
        continue-on-error: true          
   
