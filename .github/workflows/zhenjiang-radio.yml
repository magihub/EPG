name: Zhenjiang Radio

on:
  workflow_dispatch:

jobs:
  Zhenjiang_Radio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium curl_cffi

      - name: Install and join ZeroTier
        run: |
          # 创建配置目录并写入固定身份（可选，也可以不用固定身份）
          sudo mkdir -p /var/lib/zerotier-one
          echo "${{ secrets.ZEROTIER_IDENTITY_SECRET }}" | sudo tee /var/lib/zerotier-one/identity.secret > /dev/null
          # 安装 ZeroTier
          curl -s https://install.zerotier.com | sudo bash
          # 加入网络
          sudo zerotier-cli join ${{ secrets.ZEROTIER_NETWORK_ID }}
          sleep 10
          sudo zerotier-cli listnetworks | sed -E 's/([0-9]+\.[0-9]+)\.[0-9]+\.[0-9]+/\1.*.*/g; s/([0-9a-fA-F]+:[0-9a-fA-F]+):[0-9a-fA-F:]+/\1:*:*:*:*:*:*:*/g'
        env:
          ZEROTIER_NETWORK_ID: ${{ secrets.ZEROTIER_NETWORK_ID }}
          ZEROTIER_IDENTITY_SECRET: ${{ secrets.ZEROTIER_IDENTITY_SECRET }}
          
      - name: Display ZeroTier info (masked)
        run: |
          sudo zerotier-cli listnetworks | awk 'NR==3' | sed -E 's/[0-9a-f]{2}(:[0-9a-f]{2}){5}/***/g; s/([0-9]+\.[0-9]+)\.[0-9]+\.[0-9]+\/24/\1.*.*\/24/g; s/([0-9a-fA-F]+:[0-9a-fA-F]+):[0-9a-fA-F:]+(\/[0-9]+)/\1:*:*:*:*:*:*\2/g'
        continue-on-error: true
  
      - name: Test TinyProxy connectivity
        id: test_proxy
        run: |
          set +e
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -x http://${{ secrets.TINY_PROXY_IP }}:${{ secrets.TINY_PROXY_PORT }} \
            --connect-timeout 10 \
            https://www.zjmc.tv)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "代理测试成功 (HTTP $HTTP_CODE)"
            echo "proxy_ok=true" >> $GITHUB_OUTPUT
          else
            echo "代理测试失败 (HTTP $HTTP_CODE)"
            echo "proxy_ok=false" >> $GITHUB_OUTPUT
          fi
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}


      - name: Run zhenjiang-radio
        run: python scripts/zhenjiang-radio.py
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}

      - name: Run zhenjiang-epg
        run: python scripts/zhenjiang-epg.py
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}          
          