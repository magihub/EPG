name: Zhenjiang Radio

on:
  workflow_dispatch:

jobs:
  Zhenjiang_Radio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium curl_cffi

      - name: Install and join ZeroTier
        run: |
          sudo mkdir -p /var/lib/zerotier-one
          echo "${{ secrets.ZEROTIER_IDENTITY_SECRET }}" | sudo tee /var/lib/zerotier-one/identity.secret > /dev/null
          # 安装 ZeroTier
          curl -s https://install.zerotier.com | sudo bash
          # 加入网络
          sudo zerotier-cli join ${{ secrets.ZEROTIER_NETWORK_ID }}
          # 记录开始时间
          start_time=$(date +%s)
          for i in {1..30}; do
            if sudo zerotier-cli listnetworks | grep -qE '([0-9]{1,3}\.){3}[0-9]{1,3}'; then
              end_time=$(date +%s)
              elapsed=$((end_time - start_time))
              echo "ZeroTier IP assigned after ${elapsed} seconds"
              break
            fi
            echo "Waiting for IP... ($i/30)"
            sleep 1
          done
          sudo zerotier-cli listnetworks | awk '{print $2, $5}' | head -2
          sudo zerotier-cli peers
        env:
          ZEROTIER_NETWORK_ID: ${{ secrets.ZEROTIER_NETWORK_ID }}
          ZEROTIER_IDENTITY_SECRET: ${{ secrets.ZEROTIER_IDENTITY_SECRET }}

      - name: Display ZeroTier info (masked)
        run: |
          OUTPUT=$(sudo zerotier-cli listnetworks | tail -n +3 | head -1)
          if [ -n "$OUTPUT" ]; then
            echo "$OUTPUT" | sed -E '
              s/[0-9a-f]{2}(:[0-9a-f]{2}){5}/**:**:**:**:**:**/g
              s/([0-9]+\.[0-9]+)\.[0-9]+\.[0-9]+\/24/\1.*.*\/24/g
              s/([0-9a-fA-F]+:[0-9a-fA-F]+):[0-9a-fA-F:]+(\/[0-9]+)/\1:*:*:*:*:*:*\2/g
            '
          else
            echo "No ZeroTier network info available yet"
          fi
        continue-on-error: true
        
      - name: Test connectivity to proxy
        run: |
          ip route show
          ping -c 3 192.168.192.3
          curl -v http://192.168.192.3:8888
        continue-on-error: true
    
      - name: Test TinyProxy connectivity
        id: test_proxy
        run: |
          set +e
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -x http://${{ secrets.TINY_PROXY_IP }}:${{ secrets.TINY_PROXY_PORT }} \
            --connect-timeout 10 \
            https://www.zjmc.tv)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "代理测试成功 (HTTP $HTTP_CODE)"
            echo "proxy_ok=true" >> $GITHUB_OUTPUT
          else
            echo "代理测试失败 (HTTP $HTTP_CODE)"
            echo "proxy_ok=false" >> $GITHUB_OUTPUT
          fi
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}


      - name: Run zhenjiang-radio
        run: python scripts/zhenjiang-radio.py
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}

      - name: Run zhenjiang-epg
        run: python scripts/zhenjiang-epg.py
        env:
          TINY_PROXY_IP: ${{ secrets.TINY_PROXY_IP }}
          TINY_PROXY_PORT: ${{ secrets.TINY_PROXY_PORT }}          
          